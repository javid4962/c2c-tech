services:
  - type: web
    name: c2c-tech-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_DNS_SERVERS
        value: 8.8.8.8,1.1.1.1
      - key: MONGODB_SERVER_SELECTION_TIMEOUT_MS
        value: "10000"
      - key: OTP_LENGTH
        value: "6"
      - key: OTP_EXPIRES_MINUTES
        value: "10"
      - key: SMS_SENDER_ID
        value: C2C
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OTP_HASH_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CONTACT_RECEIVER_EMAIL
        sync: false
      - key: SMS_PROVIDER_URL
        sync: false
      - key: SMS_PROVIDER_TOKEN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: c2c-tech

  - type: web
    name: c2c-tech-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
